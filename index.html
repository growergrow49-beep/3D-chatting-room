<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Peer Chatroom</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-container">
        <div class="id-label">your id</div>
        <div id="my-id-display">Loading...</div>
        
        <input type="text" id="friend-id-input" placeholder="Friend's 6-Digit ID" maxlength="6" autocomplete="off" inputmode="numeric">
        <button id="connect-btn" disabled>Connect</button>
        <div id="status-text">Generating Peer ID...</div>
    </div>

    <div id="chat-interface" style="display: none;">
        <div id="chat-messages"></div>
        <div id="writing-status"></div>
        <div id="chat-input-area">
            <input type="text" id="chat-input" placeholder="Click here to chat..." autocomplete="off">
            <button id="send-btn">Send</button>
        </div>
    </div>

    <div id="labels-container"></div>

    <script>
        // --- 1. GLOBAL SETTINGS & DATA LINK ---
        let scene, camera, renderer, wireframeCube;
        let isChatroomActive = false;
        let dataConnection = null;
        
        let avatarYou, avatarFriend;
        const activeBubbles = { you: null, friend: null };

        // --- 2. PEERJS LOGIC (6-DIGIT CORE GENERATION) ---
        function generate6DigitId() {
            return Math.floor(100000 + Math.random() * 900000).toString();
        }

        const myId = generate6DigitId();
        document.getElementById('my-id-display').innerText = myId;

        const peer = new Peer(myId);

        const friendInput = document.getElementById('friend-id-input');
        const connectBtn = document.getElementById('connect-btn');
        const statusText = document.getElementById('status-text');

        peer.on('open', (id) => {
            statusText.innerText = "Ready to connect.";
        });

        friendInput.addEventListener('input', () => {
            friendInput.value = friendInput.value.replace(/[^0-9]/g, '');
            if (friendInput.value.length === 6) {
                connectBtn.classList.add('active');
                connectBtn.disabled = false;
            } else {
                connectBtn.classList.remove('active');
                connectBtn.disabled = true;
            }
        });

        connectBtn.addEventListener('click', () => {
            const friendId = friendInput.value;
            statusText.innerText = "Connecting to " + friendId + "...";
            const conn = peer.connect(friendId);
            setupConnection(conn);
        });

        peer.on('connection', (conn) => {
            statusText.innerText = "Incoming connection...";
            setupConnection(conn);
        });

        function setupConnection(conn) {
            dataConnection = conn;
            dataConnection.on('open', () => {
                statusText.innerText = "Connected!";
                switchToChatroom();
            });
            
            dataConnection.on('data', (data) => {
                if (data.type === 'chat') {
                    appendChatMessage("Friend", data.text);
                    show3DBubble('friend', data.text);
                } else if (data.type === 'writing') {
                    const writingStatus = document.getElementById('writing-status');
                    writingStatus.innerText = data.status ? "friend is writing..." : "";
                }
            });
        }

        function switchToChatroom() {
            document.getElementById('login-container').style.display = 'none';
            document.getElementById('chat-interface').style.display = 'flex';
            isChatroomActive = true;
            initChatroom();
            setupChatListeners();
        }

        // --- 3. ROBLOX CHAT RUNTIME LOGIK ---
        function setupChatListeners() {
            const chatInput = document.getElementById('chat-input');
            const sendBtn = document.getElementById('send-btn');

            chatInput.addEventListener('input', () => {
                if (dataConnection) {
                    dataConnection.send({ type: 'writing', status: chatInput.value.length > 0 });
                }
            });

            chatInput.addEventListener('blur', () => {
                if (dataConnection) {
                    dataConnection.send({ type: 'writing', status: false });
                }
            });

            function sendMessage() {
                const text = chatInput.value.trim();
                if (text === "") return;

                appendChatMessage("You", text);
                show3DBubble('you', text);

                if (dataConnection) {
                    dataConnection.send({ type: 'chat', text: text });
                    dataConnection.send({ type: 'writing', status: false });
                }

                chatInput.value = "";
            }

            sendBtn.addEventListener('click', sendMessage);
            chatInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendMessage();
            });
        }

        function appendChatMessage(sender, text) {
            const chatMessages = document.getElementById('chat-messages');
            const msgEl = document.createElement('div');
            msgEl.className = 'chat-message';
            msgEl.innerHTML = `<span class="chat-sender">${sender}:</span> ${text}`;
            chatMessages.appendChild(msgEl);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function show3DBubble(target, text) {
            const container = document.getElementById('labels-container');
            if (activeBubbles[target]) {
                activeBubbles[target].remove();
            }

            const bubble = document.createElement('div');
            bubble.className = 'roblox-bubble';
            bubble.innerText = text;
            container.appendChild(bubble);
            activeBubbles[target] = bubble;

            setTimeout(() => {
                if (activeBubbles[target] === bubble) {
                    bubble.remove();
                    activeBubbles[target] = null;
                }
            }, 15000);
        }

        function createPermanentLabel(text) {
            const container = document.getElementById('labels-container');
            const label = document.createElement('div');
            label.className = 'roblox-name-label';
            label.innerText = text;
            container.appendChild(label);
            return label;
        }

        // --- 4. THREE.JS 3D ENGINE SCENE ---
        function initLoginScene() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, -0.8, 5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            const geometry = new THREE.BoxGeometry(1.4, 1.4, 1.4);
            const material = new THREE.MeshBasicMaterial({
                color: 0x00ff00,
                wireframe: true
            });
            wireframeCube = new THREE.Mesh(geometry, material);
            scene.add(wireframeCube);

            animate();
        }

        function createEye(isLookingLeft) {
            const eyeGroup = new THREE.Group();
            
            // Eyeball (White)
            const eyeballGeo = new THREE.SphereGeometry(0.12, 16, 16);
            const eyeballMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const eyeball = new THREE.Mesh(eyeballGeo, eyeballMat);
            eyeGroup.add(eyeball);
            
            // Pupil (Black)
            const pupilGeo = new THREE.SphereGeometry(0.05, 16, 16);
            const pupilMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
            const pupil = new THREE.Mesh(pupilGeo, pupilMat);
            
            // Offset pupil outward and directly towards the other side of the room
            pupil.position.set(isLookingLeft ? -0.05 : 0.05, 0, 0.08);
            eyeGroup.add(pupil);
            
            return eyeGroup;
        }

        function initChatroom() {
            while(scene.children.length > 0){ 
                scene.remove(scene.children[0]); 
            }

            scene.background = new THREE.Color(0x333333);

            camera.aspect = window.innerWidth / window.innerHeight;
            camera.position.set(0, 4.5, 7.5); 
            camera.lookAt(0, 0.8, 0);
            camera.updateProjectionMatrix();

            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);

            // 1. Floor
            const floorMat = new THREE.MeshStandardMaterial({color: 0x5c4033, roughness: 0.7});
            const floor = new THREE.Mesh(new THREE.BoxGeometry(14, 0.2, 10), floorMat);
            floor.position.y = -0.1;
            floor.receiveShadow = true;
            scene.add(floor);

            // 2. Red Carpet
            const carpetMat = new THREE.MeshStandardMaterial({color: 0x990000, roughness: 0.9});
            const carpet = new THREE.Mesh(new THREE.BoxGeometry(6.5, 0.02, 3.5), carpetMat);
            carpet.position.set(0, 0.01, 0);
            scene.add(carpet);

            // 3. Back Wall
            const wallMat = new THREE.MeshStandardMaterial({color: 0xe67e22, roughness: 0.6});
            const backWall = new THREE.Mesh(new THREE.BoxGeometry(14, 6, 0.2), wallMat);
            backWall.position.set(0, 3, -5);
            scene.add(backWall);

            // 4. Crossed Window System
            const skyMat = new THREE.MeshBasicMaterial({color: 0x1a75ff}); 
            const sky = new THREE.Mesh(new THREE.PlaneGeometry(3.5, 2.2), skyMat);
            sky.position.set(0, 3.5, -4.95);
            scene.add(sky);

            const windowGroup = new THREE.Group();
            windowGroup.position.set(0, 3.5, -4.9);
            
            const frameMat = new THREE.MeshStandardMaterial({color: 0xffffff, roughness: 0.4});
            const borderLeft = new THREE.Mesh(new THREE.BoxGeometry(0.1, 2.3, 0.15), frameMat); borderLeft.position.set(-1.75, 0, 0);
            const borderRight = new THREE.Mesh(new THREE.BoxGeometry(0.1, 2.3, 0.15), frameMat); borderRight.position.set(1.75, 0, 0);
            const borderTop = new THREE.Mesh(new THREE.BoxGeometry(3.6, 0.1, 0.15), frameMat); borderTop.position.set(0, 1.1, 0);
            const borderBottom = new THREE.Mesh(new THREE.BoxGeometry(3.6, 0.1, 0.15), frameMat); borderBottom.position.set(0, -1.1, 0);
            
            // Grid bars crossing inside
            const vertBar = new THREE.Mesh(new THREE.BoxGeometry(0.08, 2.2, 0.1), frameMat);
            const horizBar = new THREE.Mesh(new THREE.BoxGeometry(3.5, 0.08, 0.1), frameMat);
            
            windowGroup.add(borderLeft, borderRight, borderTop, borderBottom, vertBar, horizBar);
            scene.add(windowGroup);

            // 5. Lamp
            const lampGroup = new THREE.Group();
            lampGroup.position.set(0, 6, 0);
            const wire = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 1.8), new THREE.MeshBasicMaterial({color: 0x111111}));
            wire.position.y = -0.9;
            const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.15, 16, 16), new THREE.MeshBasicMaterial({color: 0xfff2cc}));
            bulb.position.y = -1.8;
            lampGroup.add(wire, bulb);
            scene.add(lampGroup);

            // 6. Lighting
            const spotLight = new THREE.SpotLight(0xfff2cc, 3.5, 12, Math.PI / 4, 0.5, 1);
            spotLight.position.set(0, 4.2, 0);
            spotLight.target.position.set(0, 0, 0);
            spotLight.castShadow = true;
            scene.add(spotLight);
            scene.add(spotLight.target);

            // 7. Table
            const table = new THREE.Mesh(new THREE.BoxGeometry(3.5, 0.6, 1.8), new THREE.MeshStandardMaterial({color: 0x4a2c11, roughness: 0.5}));
            table.position.set(0, 0.3, 0);
            table.castShadow = true;
            scene.add(table);

            // --- OFF-TABLE ROOM AVATARS ---

            // A. You (Red Sphere - Far Right End of Room, Facing Left)
            avatarYou = new THREE.Group();
            avatarYou.position.set(4.0, 0.75, 0); // Placed completely off the table on the right floor area
            
            const bodyYou = new THREE.Mesh(new THREE.SphereGeometry(0.45, 32, 32), new THREE.MeshStandardMaterial({ color: 0xff0000, roughness: 0.4 }));
            bodyYou.castShadow = true;
            avatarYou.add(bodyYou);
            
            // Eyes on left side of the sphere to face the other side of the room
            const leftEyeYou = createEye(true); leftEyeYou.position.set(-0.35, 0.15, 0.15);
            const rightEyeYou = createEye(true); rightEyeYou.position.set(-0.35, 0.15, -0.15);
            avatarYou.add(leftEyeYou, rightEyeYou);
            scene.add(avatarYou);
            
            avatarYou.userData.labelEl = createPermanentLabel("you");

            // B. Friend (Blue Sphere - Far Left End of Room, Facing Right)
            avatarFriend = new THREE.Group();
            avatarFriend.position.set(-4.0, 0.75, 0); // Placed completely off the table on the left floor area
            
            const bodyFriend = new THREE.Mesh(new THREE.SphereGeometry(0.45, 32, 32), new THREE.MeshStandardMaterial({ color: 0x0055ff, roughness: 0.4 }));
            bodyFriend.castShadow = true;
            avatarFriend.add(bodyFriend);
            
            // Eyes on right side of the sphere to face across the room
            const leftEyeFriend = createEye(false); leftEyeFriend.position.set(0.35, 0.15, -0.15);
            const rightEyeFriend = createEye(false); rightEyeFriend.position.set(0.35, 0.15, 0.15);
            avatarFriend.add(leftEyeFriend, rightEyeFriend);
            scene.add(avatarFriend);
            
            avatarFriend.userData.labelEl = createPermanentLabel("friend");
        }

        function updateOverlayPosition(meshGroup, domElement, yOffset) {
            if (!meshGroup || !domElement) return;
            
            const tempV = new THREE.Vector3();
            meshGroup.getWorldPosition(tempV);
            tempV.y += yOffset; 
            
            tempV.project(camera);
            if (tempV.z > 1) {
                domElement.style.display = 'none';
                return;
            }
            
            const x = (tempV.x * .5 + .5) * window.innerWidth;
            const y = (tempV.y * -.5 + .5) * window.innerHeight;
            
            domElement.style.display = 'block';
            domElement.style.left = `${x}px`;
            domElement.style.top = `${y}px`;
        }

        function animate() {
            requestAnimationFrame(animate);

            if (!isChatroomActive) {
                wireframeCube.rotation.x += 0.01;
                wireframeCube.rotation.y -= 0.01;
            } else {
                updateOverlayPosition(avatarYou, avatarYou.userData.labelEl, 0.7);
                updateOverlayPosition(avatarFriend, avatarFriend.userData.labelEl, 0.7);
                
                if (activeBubbles.you) updateOverlayPosition(avatarYou, activeBubbles.you, 1.2);
                if (activeBubbles.friend) updateOverlayPosition(avatarFriend, activeBubbles.friend, 1.2);
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        initLoginScene();
    </script>
</body>
</html>
