<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Peer Chatroom</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-container">
        <div class="id-label">your id</div>
        <div id="my-id-display">Loading...</div>
        
        <input type="text" id="friend-id-input" placeholder="Friend's 6-Digit ID" maxlength="6" autocomplete="off" inputmode="numeric">
        <button id="connect-btn" disabled>Connect</button>
        <div id="status-text">Generating Peer ID...</div>
    </div>

    <div id="call-controls-container" style="display: none;">
        <button id="audio-call-btn" title="Voice Call">📞</button>
        <button id="video-call-btn" title="Video Call">📹</button>
    </div>

    <div id="video-streams-container" style="display: none;">
        <video id="friend-video-view" autoplay playsinline></video>
        <video id="my-video-preview" autoplay playsinline muted></video>
        <div id="screenshare-status-indicator" style="display: none;">Screensharing is active</div>
    </div>

    <div id="call-overlay-modal" style="display: none;">
        <h2 id="modal-title">Incoming Call...</h2>
        <p id="modal-description">A friend is calling you.</p>
  
        <div class="modal-actions" id="modal-actions-wrapper">
            <button id="modal-accept-btn">Accept</button>
            <button id="modal-decline-btn">Decline</button>
        </div>

        <div id="modal-live-controls" style="display: none;">
            <button id="screenshare-btn" title="Share Screen">🖥️</button>
            <button id="mute-btn" title="Mute Microphone">🎤</button>
            <button id="deafen-btn" title="Deafen Audio">🎧</button>
            <button id="camera-toggle-btn" title="Toggle Camera">📷</button>
            <button id="hangup-btn" title="End Call" class="hangup-danger-btn">🛑</button>
        </div>
    </div>

    <div id="lightbox-overlay" style="display: none;">
        <span id="lightbox-close-btn">&times;</span>
        <div id="lightbox-content-holder"></div>
    </div>

    <div id="chat-interface" style="display: none;">
        <div id="chat-messages"></div>
        <div id="writing-status"></div>
        <div id="chat-input-area">
       
            <button id="attachments-trigger-btn">+</button>
            <div id="ipad-context-menu" style="display: none;">
                <button class="menu-item-action" data-action="file">Upload File</button>
                <button class="menu-item-action" data-action="gallery">Upload from Gallery</button>
                <button class="menu-item-action" data-action="camera">Take Photo/Video</button>
            </div>
         
            <input type="file" id="hidden-file-element" style="display: none;" accept="*/*">
            <input type="file" id="hidden-gallery-element" style="display: none;" accept="image/*,video/*">
            <input type="file" id="hidden-camera-element" style="display: none;" accept="image/*,video/*" capture="user">

            <input type="text" id="chat-input" placeholder="Click here to chat..." autocomplete="off">
            
            <button id="voice-record-btn" title="Record Voice Memo">🎙️</button>
            <button id="send-btn">Send</button>
        </div>
    </div>

    <div id="labels-container"></div>

    <script>
        // --- 1. GLOBAL SETTINGS & DATA LINK ---
        let scene, camera, renderer, wireframeCube;
        let isChatroomActive = false;
        let dataConnection = null;
        let avatarYou, avatarFriend;
        const activeBubbles = { you: null, friend: null };
        // Web Audio Infrastructure
        let audioCtx = null;
        let bkgMusicNode = null;
        let bkgGainNode = null;
        const BASE_MUSIC_VOLUME = 0.36;
        const DUCKED_MUSIC_VOLUME = 0.08;
        let isAudioSuspendedLocally = false;
        // Call Media State
        let currentPeerCall = null;
        let currentScreenShareCall = null;
        let localMediaStream = null;
        let screenShareStream = null;
        let isMuted = false;
        let isDeafened = false;
        let isCameraOn = false;
        let activeCallType = null; // 'audio' or 'video'
        let isInCallMode = false;
        // Audio Recording Runtime Variables
        let audioRecorder = null;
        let recordedChunks = [];
        let voiceTimerInterval = null;
        let voiceRecordSeconds = 0;

        // --- 2. PEERJS LOGIC (6-DIGIT CORE GENERATION) ---
        function generate6DigitId() {
            return Math.floor(100000 + Math.random() * 900000).toString();
        }

        const myId = generate6DigitId();
        document.getElementById('my-id-display').innerText = myId;
        const peer = new Peer(myId, {
            config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }, { 'urls': 'stun:stun1.l.google.com:19302' }] }
        });
        const friendInput = document.getElementById('friend-id-input');
        const connectBtn = document.getElementById('connect-btn');
        const statusText = document.getElementById('status-text');

        peer.on('open', (id) => {
            statusText.innerText = "Ready to connect.";
        });

        friendInput.addEventListener('input', () => {
            friendInput.value = friendInput.value.replace(/[^0-9]/g, '');
            if (friendInput.value.length === 6) {
                connectBtn.classList.add('active');
                connectBtn.disabled = false;
            } else {
                connectBtn.classList.remove('active');
                connectBtn.disabled = true;
            }
        });

        connectBtn.addEventListener('click', () => {
            const friendId = friendInput.value;
            statusText.innerText = "Connecting to " + friendId + "...";
            const conn = peer.connect(friendId);
            setupConnection(conn);
        });

        peer.on('connection', (conn) => {
            statusText.innerText = "Incoming connection...";
            setupConnection(conn);
        });

        function setupConnection(conn) {
            dataConnection = conn;
            dataConnection.on('open', () => {
                statusText.innerText = "Connected!";
                switchToChatroom();
            });

            dataConnection.on('data', (data) => {
                if (data.type === 'chat') {
                    appendChatMessage("Friend", data.text);
                    show3DBubble('friend', data.text);
                } else if (data.type === 'writing') {
                    const writingStatus = document.getElementById('writing-status');
                    writingStatus.innerText = data.status ? "friend is writing..." : "";
                } else if (data.type === 'media') {
                    appendMediaMessage("Friend", data.mediaType, data.payload, data.name);
                } else if (data.type === 'call-signaling') {
                    handleIncomingCallSignal(data);
                }
            });
        }

        function switchToChatroom() {
            document.getElementById('login-container').style.display = 'none';
            document.getElementById('chat-interface').style.display = 'flex';
            document.getElementById('call-controls-container').style.display = 'flex';
            isChatroomActive = true;
            initChatroom();
            setupChatListeners();
            setupCallControlListeners();
            setupAttachmentTrayListeners();
            initAudioEngine();
            setupZoomHandler();
        }

        // --- 3. ROBLOX CHAT RUNTIME LOGIK ---
        function setupChatListeners() {
            const chatInput = document.getElementById('chat-input');
            const sendBtn = document.getElementById('send-btn');

            chatInput.addEventListener('input', () => {
                if (dataConnection) {
                    dataConnection.send({ type: 'writing', status: chatInput.value.length > 0 });
                }
            });

            chatInput.addEventListener('blur', () => {
                if (dataConnection) {
                    dataConnection.send({ type: 'writing', status: false });
                }
            });

            function sendMessage() {
                const text = chatInput.value.trim();
                if (text === "") return;

                appendChatMessage("You", text);
                show3DBubble('you', text);

                if (dataConnection) {
                    dataConnection.send({ type: 'chat', text: text });
                    dataConnection.send({ type: 'writing', status: false });
                }

                chatInput.value = "";
            }

            sendBtn.addEventListener('click', sendMessage);
            chatInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendMessage();
            });
        }

        function appendChatMessage(sender, text) {
            const chatMessages = document.getElementById('chat-messages');
            const msgEl = document.createElement('div');
            msgEl.className = 'chat-message';
            msgEl.innerHTML = `<span class="chat-sender">${sender}:</span> <span class="msg-body"></span>`;
            chatMessages.appendChild(msgEl);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            msgEl.querySelector('.msg-body').innerText = text;
        }

        function show3DBubble(target, text) {
            const container = document.getElementById('labels-container');
            if (activeBubbles[target]) {
                activeBubbles[target].remove();
            }

            const bubble = document.createElement('div');
            bubble.className = 'roblox-bubble';
            container.appendChild(bubble);
            activeBubbles[target] = bubble;

            let currentString = "";
            let charIndex = 0;
            if (target === 'you') {
                duckBackgroundMusic(true);
            }

            function printCharacter() {
                if (!activeBubbles[target] || charIndex >= text.length) {
                    if (target === 'you') {
                        duckBackgroundMusic(false);
                    }
                    setTimeout(() => {
                        if (activeBubbles[target] === bubble) {
                            bubble.remove();
                            activeBubbles[target] = null;
                        }
                    }, 15000);
                    return;
                }
                currentString += text[charIndex];
                bubble.innerText = currentString;
                
                playAnimalVoiceTick(text.charCodeAt(charIndex));
                charIndex++;
                setTimeout(printCharacter, 110);
            }

            printCharacter();
            updateOverlayPosition(target === 'you' ? avatarYou : avatarFriend, bubble, 1.2);
        }

        function createPermanentLabel(text) {
            const container = document.getElementById('labels-container');
            const label = document.createElement('div');
            label.className = 'roblox-name-label';
            label.innerText = text;
            container.appendChild(label);
            return label;
        }

        // --- 4. ATTACHMENT TRAY & MEDIA HANDLING ---
        function setupAttachmentTrayListeners() {
            const trigger = document.getElementById('attachments-trigger-btn');
            const menu = document.getElementById('ipad-context-menu');
            
            trigger.addEventListener('click', (e) => {
                e.stopPropagation();
                menu.style.display = menu.style.display === 'none' ? 'flex' : 'none';
            });

            document.addEventListener('click', () => {
                menu.style.display = 'none';
            });

            document.querySelectorAll('.menu-item-action').forEach(item => {
                item.addEventListener('click', function() {
                    const action = this.getAttribute('data-action');
                    if (action === 'file') document.getElementById('hidden-file-element').click();
                    if (action === 'gallery') document.getElementById('hidden-gallery-element').click();
                    if (action === 'camera') document.getElementById('hidden-camera-element').click();
                });
            });

            const hiddenFile = document.getElementById('hidden-file-element');
            const hiddenGallery = document.getElementById('hidden-gallery-element');
            const hiddenCamera = document.getElementById('hidden-camera-element');

            const uploadProcessor = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = function(evt) {
                    const payload = evt.target.result;
                    let mediaType = 'file';
                    if (file.type.startsWith('image/')) mediaType = 'image';
                    else if (file.type.startsWith('video/')) mediaType = 'video';

                    appendMediaMessage("You", mediaType, payload, file.name);
                    if (dataConnection) {
                        dataConnection.send({ type: 'media', mediaType: mediaType, payload: payload, name: file.name });
                    }
                };
                reader.readAsDataURL(file);
                e.target.value = "";
            };

            hiddenFile.addEventListener('change', uploadProcessor);
            hiddenGallery.addEventListener('change', uploadProcessor);
            hiddenCamera.addEventListener('change', uploadProcessor);

            document.getElementById('lightbox-close-btn').addEventListener('click', () => {
                const overlay = document.getElementById('lightbox-overlay');
                const holder = document.getElementById('lightbox-content-holder');
                overlay.style.display = 'none';
                holder.innerHTML = "";
                manageLocalAudioSuspension(false);
            });

            const recordBtn = document.getElementById('voice-record-btn');
            recordBtn.addEventListener('click', toggleVoiceRecording);
        }

        function appendMediaMessage(sender, mediaType, payload, filename) {
            const chatMessages = document.getElementById('chat-messages');
            const msgEl = document.createElement('div');
            msgEl.className = 'chat-message';
            
            let htmlContent = `<span class="chat-sender">${sender}:</span> `;
            if (mediaType === 'image') {
                htmlContent += `<div class="media-preview-container"><img src="${payload}" class="lightbox-trigger-target adaptive-preview-thumbnail" alt="Image"></div>`;
            } else if (mediaType === 'video') {
                htmlContent += `<div class="media-preview-container"><video src="${payload}" class="lightbox-trigger-target adaptive-preview-thumbnail" muted playsinline></video><div class="video-play-overlay-icon">▶</div></div>`;
            } else if (mediaType === 'audio') {
                htmlContent += `<div class="media-preview-container"><audio src="${payload}" controls class="chat-voice-element-player"></audio></div>`;
            } else {
                htmlContent += `<a href="${payload}" download="${filename}" class="chat-generic-file-anchor">📁 Download ${filename}</a>`;
            }
            
            msgEl.innerHTML = htmlContent;
            chatMessages.appendChild(msgEl);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            const trigger = msgEl.querySelector('.lightbox-trigger-target');
            if (trigger) {
                trigger.addEventListener('click', () => {
                    openLightbox(mediaType, payload);
                });
            }

            const aud = msgEl.querySelector('.chat-voice-element-player');
            if (aud) {
                aud.addEventListener('play', () => manageLocalAudioSuspension(true));
                aud.addEventListener('pause', () => manageLocalAudioSuspension(false));
                aud.addEventListener('ended', () => manageLocalAudioSuspension(false));
            }
        }

        function openLightbox(type, payload) {
            const overlay = document.getElementById('lightbox-overlay');
            const holder = document.getElementById('lightbox-content-holder');
            holder.innerHTML = "";
            
            manageLocalAudioSuspension(true);

            if (type === 'image') {
                const img = document.createElement('img');
                img.src = payload;
                img.className = 'lightbox-fullscreen-view';
                holder.appendChild(img);
            } else if (type === 'video') {
                const vid = document.createElement('video');
                vid.src = payload;
                vid.className = 'lightbox-fullscreen-view';
                vid.controls = true;
                vid.autoplay = true;
                holder.appendChild(vid);
                vid.addEventListener('ended', () => manageLocalAudioSuspension(false));
            }
            overlay.style.display = 'flex';
        }

        async function toggleVoiceRecording() {
            const btn = document.getElementById('voice-record-btn');
            if (audioRecorder && audioRecorder.state === "recording") {
                audioRecorder.stop();
                btn.classList.remove('recording-active');
                btn.innerText = "🎙️";
                clearInterval(voiceTimerInterval);
                return;
            }

            try {
                alert("Please allow Microphone access for the voice memo.");
                const stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } });
                recordedChunks = [];
                audioRecorder = new MediaRecorder(stream);
                audioRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
                audioRecorder.onstop = () => {
                    stream.getTracks().forEach(t => t.stop());
                    const blob = new Blob(recordedChunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.onload = function(evt) {
                        appendMediaMessage("You", "audio", evt.target.result, "voice.webm");
                        if (dataConnection) {
                            dataConnection.send({ type: 'media', mediaType: 'audio', payload: evt.target.result, name: "voice.webm" });
                        }
                    };
                    reader.readAsDataURL(blob);
                };

                voiceRecordSeconds = 0;
                btn.classList.add('recording-active');
                btn.innerText = "🛑 0s";
                voiceTimerInterval = setInterval(() => {
                    voiceRecordSeconds++;
                    btn.innerText = `🛑 ${voiceRecordSeconds}s`;
                }, 1000);
                audioRecorder.start();
            } catch (err) {
                console.error("Failed to access mic for voice memo:", err);
            }
        }

        // --- 5. VOICE & VIDEO CALL FLOW CONTROLS ---
        function setupCallControlListeners() {
            document.getElementById('audio-call-btn').addEventListener('click', () => initiateCallFlow('audio'));
            document.getElementById('video-call-btn').addEventListener('click', () => initiateCallFlow('video'));
            document.getElementById('screenshare-btn').addEventListener('click', toggleScreenShare);
            document.getElementById('mute-btn').addEventListener('click', toggleMute);
            document.getElementById('deafen-btn').addEventListener('click', toggleDeafen);
            document.getElementById('camera-toggle-btn').addEventListener('click', toggleCameraState);
            document.getElementById('hangup-btn').addEventListener('click', terminateActiveCall);
            peer.on('call', (call) => {
                if (call.metadata && call.metadata.isScreenShare) {
                    promptScreenShareAcceptance(call);
                } else {
                    promptIncomingCallAcceptance(call);
                }
            });
        }

        function handleIncomingCallSignal(data) {
            if (data.action === 'upgrade-request') {
                promptCallUpgradeRequest();
            } else if (data.action === 'upgrade-approved') {
                executeCameraUpgrade();
            } else if (data.action === 'upgrade-declined') {
                alert("Friend declined camera activation.");
            } else if (data.action === 'accept-notify') {
                document.getElementById('chat-interface').style.display = 'none';
                document.getElementById('call-controls-container').style.display = 'none';
                if (renderer && renderer.domElement) renderer.domElement.style.display = 'none';

                document.getElementById('modal-title').innerText = activeCallType === 'video' ? 'Video call active' : 'Call active';
                document.getElementById('modal-description').innerText = "Connected with friend.";
                document.getElementById('modal-live-controls').style.display = 'flex';
            }
        }

        async function initiateCallFlow(type) {
            activeCallType = type;
            isInCallMode = true;
            toggle3DLabelsVisibility(false);
            
            document.getElementById('chat-interface').style.display = 'none';
            document.getElementById('call-controls-container').style.display = 'none';
            if (renderer && renderer.domElement) renderer.domElement.style.display = 'none';

            const modal = document.getElementById('call-overlay-modal');
            document.getElementById('modal-title').innerText = "Calling your friend...";
            document.getElementById('modal-description').innerText = `Initiating ${type === 'video' ? 'Video' : 'Voice'} Call connection.`;
            document.getElementById('modal-actions-wrapper').style.display = 'none';
            document.getElementById('modal-live-controls').style.display = 'flex';
            modal.style.display = 'flex';
            
            updateStatusLabelText("Calling friend...");
            try {
                const constraints = {
                    audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true },
                    video: type === 'video' ? { width: { ideal: 1920 }, height: { ideal: 1080 }, frameRate: { ideal: 60 } } : false
                };
                localMediaStream = await navigator.mediaDevices.getUserMedia(constraints);
                isCameraOn = type === 'video';

                document.getElementById('video-streams-container').style.display = 'block';
                if (type === 'video') {
                    document.getElementById('my-video-preview').srcObject = localMediaStream;
                    document.getElementById('my-video-preview').style.display = 'block';
                } else {
                    document.getElementById('my-video-preview').style.display = 'none';
                }

                if (dataConnection) {
                    dataConnection.send({ type: 'call-signaling', action: 'dial', callType: type });
                }

                const friendId = dataConnection.peer;
                const call = peer.call(friendId, localMediaStream, { metadata: { callType: type } });
                attachCallStreamListeners(call);
            } catch (err) {
                console.error("Could not acquire media devices for call:", err);
                updateStatusLabelText("Call failed.");
                cleanupCallEndState();
            }
        }

        function promptIncomingCallAcceptance(call) {
            const type = call.metadata ? call.metadata.callType : 'audio';
            activeCallType = type;
            isInCallMode = true;
            toggle3DLabelsVisibility(false);
            
            const modal = document.getElementById('call-overlay-modal');
            document.getElementById('modal-title').innerText = "Incoming Call";
            document.getElementById('modal-description').innerText = `Friend is calling via ${type === 'video' ? 'Video Call' : 'Voice Call'}. Do you want to answer?`;
            document.getElementById('modal-actions-wrapper').style.display = 'flex'; 
            document.getElementById('modal-live-controls').style.display = 'none';
            modal.style.display = 'flex';

            const acceptBtn = document.getElementById('modal-accept-btn');
            const declineBtn = document.getElementById('modal-decline-btn');
            acceptBtn.onclick = async () => {
                document.getElementById('chat-interface').style.display = 'none';
                document.getElementById('call-controls-container').style.display = 'none';
                if (renderer && renderer.domElement) renderer.domElement.style.display = 'none';

                document.getElementById('modal-actions-wrapper').style.display = 'none';
                document.getElementById('modal-live-controls').style.display = 'flex';
                document.getElementById('modal-title').innerText = type === 'video' ? 'Video call active' : 'Call active';
                document.getElementById('modal-description').innerText = "Connected with friend.";
                if (dataConnection) {
                    dataConnection.send({ type: 'call-signaling', action: 'accept-notify' });
                }
                
                try {
                    const constraints = {
                        audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true },
                        video: type === 'video' ? { width: { ideal: 1920 }, height: { ideal: 1080 }, frameRate: { ideal: 60 } } : false
                    };
                    localMediaStream = await navigator.mediaDevices.getUserMedia(constraints);
                    isCameraOn = type === 'video';

                    document.getElementById('video-streams-container').style.display = 'block';
                    if (type === 'video') {
                        document.getElementById('my-video-preview').srcObject = localMediaStream;
                        document.getElementById('my-video-preview').style.display = 'block';
                    } else {
                        document.getElementById('my-video-preview').style.display = 'none';
                    }

                    call.answer(localMediaStream);
                    attachCallStreamListeners(call);
                } catch (err) {
                    console.error("Error accepting call stream:", err);
                    cleanupCallEndState();
                }
            };
            declineBtn.onclick = () => {
                modal.style.display = 'none';
                call.close();
                cleanupCallEndState();
            };
        }

        function attachCallStreamListeners(call) {
            currentPeerCall = call;
            updateStatusLabelText("In Call");
            manageLocalAudioSuspension(true);
            toggleCallControlButtonsVisibility(true);

            const modal = document.getElementById('call-overlay-modal');
            if (modal.style.display === 'flex' && document.getElementById('modal-title').innerText === "Calling your friend...") {
                document.getElementById('modal-title').innerText = activeCallType === 'video' ? 'Video call active' : 'Call active';
                document.getElementById('modal-description').innerText = "Connected with friend.";
            }

            call.on('stream', (remoteStream) => {
                if (call.metadata && call.metadata.isScreenShare) return;

                const friendVideo = document.getElementById('friend-video-view');
                friendVideo.srcObject = remoteStream;
          
                document.getElementById('video-streams-container').style.display = 'block';
                if (activeCallType === 'audio') {
                    friendVideo.style.display = 'none';
                } else {
                    friendVideo.style.display = 'block';
                }
            });
            call.on('close', () => {
                cleanupCallEndState();
            });
        }

        function toggleCallControlButtonsVisibility(inCall) {
            const liveControls = document.getElementById('modal-live-controls');
            if (inCall) {
                liveControls.style.display = 'flex';
                document.getElementById('camera-toggle-btn').classList.toggle('control-disabled-state', !isCameraOn);
            }
        }

        function updateStatusLabelText(text) {
            const writingStatus = document.getElementById('writing-status');
            if (writingStatus) writingStatus.innerText = text === "In Call" ? "" : text;
        }

        function toggleMute() {
            if (!localMediaStream) return;
            isMuted = !isMuted;
            localMediaStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
            document.getElementById('mute-btn').innerText = isMuted ? "🔇" : "🎤";
            document.getElementById('mute-btn').classList.toggle('control-disabled-state', isMuted);
        }

        function toggleDeafen() {
            isDeafened = !isDeafened;
            const friendVideo = document.getElementById('friend-video-view');
            if (friendVideo) friendVideo.muted = isDeafened;
            document.getElementById('deafen-btn').innerText = isDeafened ? "🔊" : "🎧";
            document.getElementById('deafen-btn').classList.toggle('control-disabled-state', isDeafened);
        }

        function toggleCameraState() {
            if (!localMediaStream) return;
            if (activeCallType === 'audio' && !isCameraOn) {
                if (dataConnection) {
                    dataConnection.send({ type: 'call-signaling', action: 'upgrade-request' });
                }
            } else {
                isCameraOn = !isCameraOn;
                localMediaStream.getVideoTracks().forEach(t => t.enabled = isCameraOn);
                document.getElementById('my-video-preview').style.display = isCameraOn ? 'block' : 'none';
                document.getElementById('camera-toggle-btn').classList.toggle('control-disabled-state', !isCameraOn);
                if (isCameraOn && activeCallType === 'video') {
                    document.getElementById('video-streams-container').style.display = 'block';
                    document.getElementById('modal-title').innerText = 'Video call active';
                }
            }
        }

        function promptCallUpgradeRequest() {
            const modal = document.getElementById('call-overlay-modal');
            document.getElementById('modal-title').innerText = "Upgrade to Video Call";
            document.getElementById('modal-description').innerText = "Friend wants to activate their camera. Confirm?";
            document.getElementById('modal-actions-wrapper').style.display = 'flex';
            document.getElementById('modal-live-controls').style.display = 'none';
            modal.style.display = 'flex';
            
            document.getElementById('modal-accept-btn').onclick = () => {
                document.getElementById('modal-actions-wrapper').style.display = 'none';
                document.getElementById('modal-live-controls').style.display = 'flex';
                document.getElementById('modal-title').innerText = 'Video call active';
                document.getElementById('modal-description').innerText = "Connected with friend.";
                if (dataConnection) dataConnection.send({ type: 'call-signaling', action: 'upgrade-approved' });
                executeCameraUpgrade();
            };
            document.getElementById('modal-decline-btn').onclick = () => {
                document.getElementById('modal-actions-wrapper').style.display = 'none';
                document.getElementById('modal-live-controls').style.display = 'flex';
                document.getElementById('modal-title').innerText = activeCallType === 'video' ? 'Video call active' : 'Call active';
                document.getElementById('modal-description').innerText = "Connected with friend.";
                if (dataConnection) dataConnection.send({ type: 'call-signaling', action: 'upgrade-declined' });
            };
        }

        async function executeCameraUpgrade() {
            activeCallType = 'video';
            isCameraOn = true;
            try {
                const videoTrackStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: { ideal: 1920 }, height: { ideal: 1080 }, frameRate: { ideal: 60 } } 
                });
                const videoTrack = videoTrackStream.getVideoTracks()[0];
                
                if (localMediaStream) {
                    localMediaStream.addTrack(videoTrack);
                    if (currentPeerCall && currentPeerCall.peerConnection) {
                        const senders = currentPeerCall.peerConnection.getSenders();
                        const sender = senders.find(s => s.track && s.track.kind === 'video');
                        if (sender) {
                            sender.replaceTrack(videoTrack);
                        } else {
                            currentPeerCall.peerConnection.addTrack(videoTrack, localMediaStream);
                        }
                    }
                }
                
                document.getElementById('video-streams-container').style.display = 'block';
                document.getElementById('friend-video-view').style.display = 'block';
                document.getElementById('my-video-preview').style.display = 'block';
                document.getElementById('my-video-preview').srcObject = localMediaStream;
                document.getElementById('camera-toggle-btn').classList.remove('control-disabled-state');
                
                document.getElementById('modal-title').innerText = 'Video call active';
            } catch (e) {
                console.error("Camera upgrade execution acquisition crash:", e);
            }
        }

        // --- 6. SCREEN SHARING PLATFORM CHANNELS ---
        async function toggleScreenShare() {
            if (screenShareStream) {
                stopScreenShareInstance();
                return;
            }

            try {
                screenShareStream = await navigator.mediaDevices.getDisplayMedia({ 
                    video: { width: { ideal: 1920 }, height: { ideal: 1080 }, frameRate: { ideal: 60 } },
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: false,
                        autoGainControl: false
                    } 
                });
                const friendId = dataConnection.peer;
                const shareCall = peer.call(friendId, screenShareStream, { metadata: { isScreenShare: true } });
                currentScreenShareCall = shareCall;
                
                screenShareStream.getVideoTracks()[0].onended = () => {
                    stopScreenShareInstance();
                };
                
                document.getElementById('screenshare-btn').classList.add('sharing-active-frame');
                document.getElementById('modal-description').innerText = "Screensharing is active";
                document.getElementById('screenshare-status-indicator').style.display = 'block';
            } catch (err) {
                console.error("Error sourcing display capture media streams:", err);
            }
        }

        function promptScreenShareAcceptance(call) {
            document.getElementById('chat-interface').style.display = 'none';
            document.getElementById('call-controls-container').style.display = 'none';
            if (renderer && renderer.domElement) renderer.domElement.style.display = 'none';

            const modal = document.getElementById('call-overlay-modal');
            document.getElementById('modal-title').innerText = "Screen Share Stream";
            document.getElementById('modal-description').innerText = "Friend wants to share their screen. Watch?";
            document.getElementById('modal-actions-wrapper').style.display = 'flex';
            document.getElementById('modal-live-controls').style.display = 'none';
            modal.style.display = 'flex';
            
            document.getElementById('modal-accept-btn').onclick = () => {
                document.getElementById('modal-actions-wrapper').style.display = 'none';
                document.getElementById('modal-live-controls').style.display = 'flex';
                document.getElementById('modal-title').innerText = activeCallType === 'video' ? 'Video call active' : 'Call active';
                document.getElementById('modal-description').innerText = "Viewing Friend's Screen";
                currentScreenShareCall = call;
                call.answer(); 
                
                document.getElementById('video-streams-container').style.display = 'block';
                const friendVideo = document.getElementById('friend-video-view');
                friendVideo.style.display = 'block';
                
                call.on('stream', (remoteStream) => {
                    friendVideo.srcObject = remoteStream;
                });
            };

            document.getElementById('modal-decline-btn').onclick = () => {
                document.getElementById('modal-actions-wrapper').style.display = 'none';
                document.getElementById('modal-live-controls').style.display = 'flex';
                document.getElementById('modal-title').innerText = activeCallType === 'video' ? 'Video call active' : 'Call active';
                document.getElementById('modal-description').innerText = "Connected with friend.";
                call.close();
            };
        }

        function stopScreenShareInstance() {
            if (screenShareStream) {
                screenShareStream.getTracks().forEach(t => t.stop());
                screenShareStream = null;
            }
            if (currentScreenShareCall) {
                currentScreenShareCall.close();
                currentScreenShareCall = null;
            }
            document.getElementById('screenshare-btn').classList.remove('sharing-active-frame');
            document.getElementById('modal-description').innerText = "Connected with friend.";
            document.getElementById('screenshare-status-indicator').style.display = 'none';
            
            // Wenn der normale Anruf noch aktiv ist, das Video zurücksetzen
            if (currentPeerCall && activeCallType === 'video') {
                const friendVideo = document.getElementById('friend-video-view');
                if (friendVideo && currentPeerCall.peerConnection) {
                    const remoteStream = new MediaStream();
                    currentPeerCall.peerConnection.getReceivers().forEach(receiver => {
                        if (receiver.track) remoteStream.addTrack(receiver.track);
                    });
                    friendVideo.srcObject = remoteStream;
                }
            }
        }

        function terminateActiveCall() {
            if (currentPeerCall) currentPeerCall.close();
            cleanupCallEndState();
        }

        function cleanupCallEndState() {
            stopScreenShareInstance();
            if (localMediaStream) {
                localMediaStream.getTracks().forEach(t => t.stop());
                localMediaStream = null;
            }
            
            document.getElementById('video-streams-container').style.display = 'none';
            const friendVideo = document.getElementById('friend-video-view');
            if (friendVideo) friendVideo.srcObject = null;
            document.getElementById('my-video-preview').srcObject = null;

            isMuted = false;
            isDeafened = false;
            isCameraOn = false;
            document.getElementById('mute-btn').innerText = "🎤";
            document.getElementById('deafen-btn').innerText = "🎧";
            document.getElementById('mute-btn').classList.remove('control-disabled-state');
            document.getElementById('deafen-btn').classList.remove('control-disabled-state');
            document.getElementById('camera-toggle-btn').classList.remove('control-disabled-state');

            updateStatusLabelText("");
            manageLocalAudioSuspension(false);
            isInCallMode = false;
            document.getElementById('call-overlay-modal').style.display = 'none';
            document.getElementById('modal-live-controls').style.display = 'none';
            
            document.getElementById('chat-interface').style.display = 'flex';
            document.getElementById('call-controls-container').style.display = 'flex';
            if (renderer && renderer.domElement) renderer.domElement.style.display = 'block';
            
            toggle3DLabelsVisibility(true);
        }

        function toggle3DLabelsVisibility(visible) {
            if (avatarYou && avatarYou.userData.labelEl) {
                avatarYou.userData.labelEl.style.visibility = visible ? 'visible' : 'hidden';
            }
            if (avatarFriend && avatarFriend.userData.labelEl) {
                avatarFriend.userData.labelEl.style.visibility = visible ? 'visible' : 'hidden';
            }
        }

        // --- 7. CORE PER-SCRIPT PROGRAMMATIC AUDIO ENGINE ---
        function initAudioEngine() {
            try {
                const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContextClass();
                
                const bufferSize = audioCtx.sampleRate * 8;
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                
                for (let i = 0; i < bufferSize; i++) {
                    const t = i / audioCtx.sampleRate;
                    let f1 = 196.00, f2 = 246.94, f3 = 293.66;
                    if (t > 2.0 && t <= 4.0) { f1 = 261.63; f2 = 329.63; f3 = 392.00; }
                    else if (t > 4.0 && t <= 6.0) { f1 = 293.66; f2 = 369.99; f3 = 440.00; }
                    else if (t > 6.0) { f1 = 196.00; f2 = 246.94; f3 = 392.00; }
                    
                    const wave1 = Math.sin(2 * Math.PI * f1 * t);
                    const wave2 = Math.sin(2 * Math.PI * f2 * t);
                    const wave3 = Math.sin(2 * Math.PI * f3 * t);
                    const swingEnvelope = Math.sin(2 * Math.PI * 0.5 * t) * 0.4 + 0.6;
                    let melody = 0;
                    const subT = t % 1.0;
                    if (subT < 0.15) {
                        const melFreq = 392.00 * (1 + ((Math.floor(t) % 4) * 0.25));
                        melody = Math.sin(2 * Math.PI * melFreq * t) * Math.exp(-25 * subT);
                    }
                    
                    data[i] = (((wave1 + wave2 * 0.6 + wave3 * 0.4) * 0.2) * swingEnvelope) + (melody * 0.15);
                }

                bkgMusicNode = audioCtx.createBufferSource();
                bkgMusicNode.buffer = buffer;
                bkgMusicNode.loop = true;

                bkgGainNode = audioCtx.createGain();
                bkgGainNode.gain.setValueAtTime(BASE_MUSIC_VOLUME, audioCtx.currentTime);

                bkgMusicNode.connect(bkgGainNode);
                bkgGainNode.connect(audioCtx.destination);
                
                bkgMusicNode.start(0);
            } catch (err) {
                console.warn("Web Audio API Synthesizer Context construction block:", err);
            }
        }

        function duckBackgroundMusic(shouldDuck) {
            if (!bkgGainNode || isAudioSuspendedLocally) return;
            const targetVolume = shouldDuck ? DUCKED_MUSIC_VOLUME : BASE_MUSIC_VOLUME;
            bkgGainNode.gain.linearRampToValueAtTime(targetVolume, audioCtx.currentTime + 0.2);
        }

        function manageLocalAudioSuspension(shouldSuspend) {
            if (!bkgGainNode) return;
            isAudioSuspendedLocally = shouldSuspend;
            const targetVolume = shouldSuspend ? 0.0 : BASE_MUSIC_VOLUME;
            bkgGainNode.gain.setValueAtTime(targetVolume, audioCtx.currentTime);
        }

        function playAnimalVoiceTick(charValue) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            const pitchOffset = (charValue % 8) * 60;
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(320 + pitchOffset, audioCtx.currentTime);
            
            gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.06);
        }

        // --- 8. THREE.JS 3D ENGINE SCENE ---
        function initLoginScene() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, -0.8, 5);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            const geometry = new THREE.BoxGeometry(1.4, 1.4, 1.4);
            const material = new THREE.MeshBasicMaterial({
                color: 0x00ff00,
                wireframe: true
            });
            wireframeCube = new THREE.Mesh(geometry, material);
            scene.add(wireframeCube);

            animate();
        }

        function createEye(isLookingLeft) {
            const eyeGroup = new THREE.Group();
            const eyeballGeo = new THREE.SphereGeometry(0.12, 16, 16);
            const eyeballMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const eyeball = new THREE.Mesh(eyeballGeo, eyeballMat);
            eyeGroup.add(eyeball);
            
            const pupilGeo = new THREE.SphereGeometry(0.05, 16, 16);
            const pupilMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
            const pupil = new THREE.Mesh(pupilGeo, pupilMat);
            pupil.position.set(isLookingLeft ? -0.05 : 0.05, 0, 0.08);
            eyeGroup.add(pupil);
            
            return eyeGroup;
        }

        function initChatroom() {
            while(scene.children.length > 0){ 
                scene.remove(scene.children[0]);
            }

            scene.background = new THREE.Color(0x333333);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.position.set(0, 4.6, 7.8);
            camera.lookAt(0, 0.8, 0);
            camera.updateProjectionMatrix();

            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);
            const floorMat = new THREE.MeshStandardMaterial({color: 0x5c4033, roughness: 0.7});
            const floor = new THREE.Mesh(new THREE.BoxGeometry(14, 0.2, 10), floorMat);
            floor.position.y = -0.1;
            floor.receiveShadow = true;
            scene.add(floor);
            const carpetMat = new THREE.MeshStandardMaterial({color: 0x990000, roughness: 0.9});
            const carpet = new THREE.Mesh(new THREE.BoxGeometry(6.5, 0.02, 3.5), carpetMat);
            carpet.position.set(0, 0.01, 0);
            scene.add(carpet);
            const wallMat = new THREE.MeshStandardMaterial({color: 0xe67e22, roughness: 0.6});
            const backWall = new THREE.Mesh(new THREE.BoxGeometry(14, 6, 0.2), wallMat);
            backWall.position.set(0, 3, -5);
            scene.add(backWall);

            const skyMat = new THREE.MeshBasicMaterial({color: 0x1a75ff}); 
            const sky = new THREE.Mesh(new THREE.PlaneGeometry(3.5, 2.2), skyMat);
            sky.position.set(0, 3.5, -4.95);
            scene.add(sky);
            const windowGroup = new THREE.Group();
            windowGroup.position.set(0, 3.5, -4.9);
            
            const frameMat = new THREE.MeshStandardMaterial({color: 0xffffff, roughness: 0.4});
            const borderLeft = new THREE.Mesh(new THREE.BoxGeometry(0.1, 2.3, 0.15), frameMat); borderLeft.position.set(-1.75, 0, 0);
            const borderRight = new THREE.Mesh(new THREE.BoxGeometry(0.1, 2.3, 0.15), frameMat); borderRight.position.set(1.75, 0, 0);
            const borderTop = new THREE.Mesh(new THREE.BoxGeometry(3.6, 0.1, 0.15), frameMat); borderTop.position.set(0, 1.1, 0);
            const borderBottom = new THREE.Mesh(new THREE.BoxGeometry(3.6, 0.1, 0.15), frameMat); borderBottom.position.set(0, -1.1, 0);
            const vertBar = new THREE.Mesh(new THREE.BoxGeometry(0.08, 2.2, 0.1), frameMat);
            const horizBar = new THREE.Mesh(new THREE.BoxGeometry(3.5, 0.08, 0.1), frameMat);
            windowGroup.add(borderLeft, borderRight, borderTop, borderBottom, vertBar, horizBar);
            scene.add(windowGroup);

            const lampGroup = new THREE.Group();
            lampGroup.position.set(0, 6, 0);
            const wire = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 1.8), new THREE.MeshBasicMaterial({color: 0x111111}));
            wire.position.y = -0.9;
            const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.15, 16, 16), new THREE.MeshBasicMaterial({color: 0xfff2cc}));
            bulb.position.y = -1.8;
            lampGroup.add(wire, bulb);
            scene.add(lampGroup);
            const spotLight = new THREE.SpotLight(0xfff2cc, 3.5, 12, Math.PI / 4, 0.5, 1);
            spotLight.position.set(0, 4.2, 0);
            spotLight.target.position.set(0, 0, 0);
            spotLight.castShadow = true;
            scene.add(spotLight);
            scene.add(spotLight.target);

            const table = new THREE.Mesh(new THREE.BoxGeometry(3.5, 0.6, 1.8), new THREE.MeshStandardMaterial({color: 0x4a2c11, roughness: 0.5}));
            table.position.set(0, 0.3, 0);
            table.castShadow = true;
            scene.add(table);

            avatarYou = new THREE.Group();
            avatarYou.position.set(2.1, 0.75, 0);
            const bodyYou = new THREE.Mesh(new THREE.SphereGeometry(0.45, 32, 32), new THREE.MeshStandardMaterial({ color: 0xff0000, roughness: 0.4 }));
            bodyYou.castShadow = true;
            avatarYou.add(bodyYou);
            const leftEyeYou = createEye(true); leftEyeYou.position.set(-0.35, 0.15, 0.15);
            const rightEyeYou = createEye(true); rightEyeYou.position.set(-0.35, 0.15, -0.15);
            avatarYou.add(leftEyeYou, rightEyeYou);
            scene.add(avatarYou);
            
            avatarYou.userData.labelEl = createPermanentLabel("you");
            avatarFriend = new THREE.Group();
            avatarFriend.position.set(-2.1, 0.75, 0);
            const bodyFriend = new THREE.Mesh(new THREE.SphereGeometry(0.45, 32, 32), new THREE.MeshStandardMaterial({ color: 0x0055ff, roughness: 0.4 }));
            bodyFriend.castShadow = true;
            avatarFriend.add(bodyFriend);
            const leftEyeFriend = createEye(false); leftEyeFriend.position.set(0.35, 0.15, -0.15);
            const rightEyeFriend = createEye(false); rightEyeFriend.position.set(0.35, 0.15, 0.15);
            avatarFriend.add(leftEyeFriend, rightEyeFriend);
            scene.add(avatarFriend);
            
            avatarFriend.userData.labelEl = createPermanentLabel("friend");
        }

        // --- 8.1 CAMERA ZOOM HANDLING ACTION ---
        function setupZoomHandler() {
            const minZ = 3.0;
            const maxZ = 15.0;
            const zoomSpeed = 0.005;

            window.addEventListener('wheel', (e) => {
                if (!isChatroomActive) return;
                e.preventDefault();

                let currentZ = camera.position.z + e.deltaY * zoomSpeed;
                if (currentZ < minZ) currentZ = minZ;
                if (currentZ > maxZ) currentZ = maxZ;

                camera.position.z = currentZ;
                camera.position.y = 0.589 * currentZ; 

                camera.lookAt(0, 0.8, 0);
                camera.updateProjectionMatrix();
            }, { passive: false });

            let initialTouchDistance = null;
            let initialZ = null;
            window.addEventListener('touchstart', (e) => {
                if (!isChatroomActive || e.touches.length !== 2) return;
                initialTouchDistance = Math.hypot(
                    e.touches[0].pageX - e.touches[1].pageX,
                    e.touches[0].pageY - e.touches[1].pageY
                );
                initialZ = camera.position.z;
            }, { passive: true });
            window.addEventListener('touchmove', (e) => {
                if (!isChatroomActive || e.touches.length !== 2 || initialTouchDistance === null) return;
                e.preventDefault();

                const currentDistance = Math.hypot(
                    e.touches[0].pageX - e.touches[1].pageX,
                    e.touches[0].pageY - e.touches[1].pageY
                );
                
                const factor = initialTouchDistance / currentDistance;
                let currentZ = initialZ * factor;

                if (currentZ < minZ) currentZ = minZ;
                if (currentZ > maxZ) currentZ = maxZ;

                camera.position.z = currentZ;
                camera.position.y = 0.589 * currentZ;

                camera.lookAt(0, 0.8, 0);
                camera.updateProjectionMatrix();
            }, { passive: false });
            window.addEventListener('touchend', () => {
                initialTouchDistance = null;
                initialZ = null;
            }, { passive: true });
        }

        function updateOverlayPosition(meshGroup, domElement, yOffset) {
            if (!meshGroup || !domElement) return;
            const tempV = new THREE.Vector3();
            meshGroup.getWorldPosition(tempV);
            tempV.y += yOffset; 
            
            tempV.project(camera);
            if (tempV.z > 1) {
                domElement.style.display = 'none';
                return;
            }
            
            const x = (tempV.x * .5 + .5) * window.innerWidth;
            const y = (tempV.y * -.5 + .5) * window.innerHeight;
            
            domElement.style.display = 'block';
            domElement.style.left = `${x}px`;
            domElement.style.top = `${y}px`;
        }

        function animate() {
            requestAnimationFrame(animate);
            if (!isChatroomActive) {
                wireframeCube.rotation.x += 0.01;
                wireframeCube.rotation.y -= 0.01;
            } else {
                const breatheTime = Date.now() * 0.003;
                const breatheScale = 1.0 + Math.sin(breatheTime) * 0.03;
                
                if (avatarYou) {
                    avatarYou.scale.set(breatheScale, breatheScale, breatheScale);
                }
                if (avatarFriend) {
                    avatarFriend.scale.set(breatheScale, breatheScale, breatheScale);
                }

                if (!isInCallMode) {
                    updateOverlayPosition(avatarYou, avatarYou.userData.labelEl, 0.7);
                    updateOverlayPosition(avatarFriend, avatarFriend.userData.labelEl, 0.7);
                } else {
                    toggle3DLabelsVisibility(false);
                }
                
                if (activeBubbles.you) updateOverlayPosition(avatarYou, activeBubbles.you, 1.2);
                if (activeBubbles.friend) updateOverlayPosition(avatarFriend, activeBubbles.friend, 1.2);
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        initLoginScene();
    </script>
